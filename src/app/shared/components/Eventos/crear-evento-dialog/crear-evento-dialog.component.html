<p-dialog
  header="Crear Nuevo Evento"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '700px' }"
  [draggable]="false"
  [resizable]="false"
  styleClass="custom-modal">

  <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2">

    <div class="col-span-1 md:col-span-2 flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-bookmark text-teal-600"></i> Título del Evento
      </label>
      <input
        pInputText
        class="form-field w-full"
        formControlName="titulo"
        placeholder="Ej. Capacitación TIC Avanzada">
    </div>

    <div class="col-span-1 md:col-span-2 flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-align-left text-teal-600"></i> Descripción
      </label>
      <textarea
        pTextarea
        rows="3"
        class="form-field w-full"
        formControlName="descripcion"
        placeholder="Detalles detallados sobre el evento...">
      </textarea>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-map-marker text-teal-600"></i> Lugar (Venue)
      </label>
      <p-dropdown
        styleClass="form-field w-full"
        formControlName="tipoVenuesId"
        [options]="tiposVenues"
        optionLabel="nombre"
        optionValue="venueId"
        placeholder="Selecciona Venue"
        appendTo="body">
      </p-dropdown>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-tags text-teal-600"></i> Tipo de Evento
      </label>
      <p-dropdown
        styleClass="form-field w-full"
        formControlName="tipoEventoId"
        [options]="tiposEvento"
        optionLabel="nombre"
        optionValue="tipoEvenId"
        placeholder="Selecciona tipo"
        appendTo="body">
      </p-dropdown>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-users text-teal-600"></i> Capacidad Máxima
      </label>
      <p-inputNumber
        styleClass="w-full"
        inputStyleClass="form-field w-full"
        formControlName="capacidadMaxima"
        placeholder="0">
      </p-inputNumber>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-dollar text-teal-600"></i> Precio Entrada
      </label>
      <p-inputNumber
        mode="currency"
        currency="COP"
        locale="es-CO"
        styleClass="w-full"
        inputStyleClass="form-field w-full"
        formControlName="precioEntrada"
        placeholder="$ 0">
      </p-inputNumber>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-calendar text-teal-600"></i> Fecha de Inicio
      </label>
      <p-calendar
        styleClass="w-full"
        inputStyleClass="form-field w-full"
        formControlName="fechaInicio"
        [showTime]="true"
        placeholder="Selecciona fecha y hora"
        appendTo="body">
      </p-calendar>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-slate-700 tracking-wide uppercase flex items-center gap-1">
        <i class="pi pi-calendar-times text-teal-600"></i> Fecha de Finalización
      </label>
      <p-calendar
        styleClass="w-full"
        inputStyleClass="form-field w-full"
        formControlName="fechaFin"
        [showTime]="true"
        placeholder="Selecciona fecha y hora"
        appendTo="body">
      </p-calendar>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex items-center justify-center gap-4 pt-4 border-t border-slate-100 mt-6 w-full">
      <button 
        type="button"
        (click)="cerrar()"
        class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-slate-300 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-all shadow-sm">
        <i class="pi pi-times-circle text-base text-slate-500"></i>
        Cancelar
      </button>

      <button 
        type="button"
        [disabled]="guardando"
        (click)="guardar()"
        class="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-teal-600 text-white font-bold text-sm hover:bg-teal-700 transition-all shadow-md shadow-teal-100 disabled:opacity-50">
        @if (guardando) {
          <i class="pi pi-spin pi-spinner text-base"></i>
          Guardando...
        } @else {
          <i class="pi pi-check-circle text-base"></i>
          Crear Evento
        }
      </button>
    </div>
  </ng-template>
</p-dialog>
