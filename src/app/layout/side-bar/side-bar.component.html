<div class="w-64 h-screen bg-verde-azulado text-white flex flex-col justify-between p-4 shadow-md">
  <div>
    <div class="flex justify-center mb-8 p-2">
      <img src="assets/logo.png" alt="Logo App" class="h-12 object-contain"
           onerror="this.src='https://placehold.co/150x50/14564e/white?text=Eventos'"/>
    </div>

    <nav class="flex flex-col gap-2">
      @for (item of menuFiltrado(); track item.label) {
        <a [routerLink]="item.route"
           routerLinkActive="bg-verde-azulado-claro font-semibold"
           [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-100 hover:bg-white/10 transition-colors cursor-pointer">
          <i [class]="item.icon + ' text-xl'"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>

  <div class="text-xs text-slate-300 text-center border-t border-white/10 pt-4">
    v1.0.0
  </div>
</div>
